<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shravya H M — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #222;
      --accent: #00E5CC; --text: #f0f0f0; --muted: #ffffff;
      --font-display: 'Playfair Display', serif; --font-mono: 'Space Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    }
    nav { position: fixed; top:0; left:0; right:0; z-index:100; display:flex; justify-content:space-between; align-items:center; padding:1.4rem 3rem; border-bottom:1px solid var(--border); background:rgba(10,10,10,0.9); backdrop-filter:blur(14px); }
    .nav-logo { font-family:var(--font-display); font-weight:800; font-size:1.1rem; color:var(--accent); }
    .nav-links { display:flex; gap:1.8rem; list-style:none; }
    .nav-links a { text-decoration:none; color:var(--muted); font-size:.68rem; letter-spacing:2px; text-transform:uppercase; transition:color .2s; }
    .nav-links a:hover { color:var(--accent); }
    .hero { min-height:100vh; display:flex; flex-direction:column; justify-content:flex-end; padding:0 3rem 5rem; position:relative; overflow:hidden; }
    .hero-bg { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:var(--font-display); font-weight:800; font-size:clamp(6rem,16vw,16rem); color:transparent; -webkit-text-stroke:1px rgba(0,229,204,.055); white-space:nowrap; user-select:none; pointer-events:none; animation:float 9s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translate(-50%,-50%) translateY(0)} 50%{transform:translate(-50%,-50%) translateY(-16px)} }
    .hero-tag { font-size:.66rem; letter-spacing:4px; text-transform:uppercase; color:var(--accent); margin-bottom:1.3rem; opacity:0; animation:fadeUp .8s ease forwards .2s; }
    .hero-title { font-family:var(--font-display); font-weight:900; font-size:clamp(3rem,8.5vw,8.5rem); line-height:.94; letter-spacing:-3px; margin-bottom:1.8rem; opacity:0; animation:fadeUp .8s ease forwards .4s; }
    .hero-title span { color:var(--accent); }
    .hero-sub { max-width:520px; color:var(--muted); font-size:.78rem; line-height:1.95; margin-bottom:2.5rem; opacity:0; animation:fadeUp .8s ease forwards .6s; }
    .hero-cta { display:flex; gap:1rem; align-items:center; flex-wrap:wrap; opacity:0; animation:fadeUp .8s ease forwards .8s; }
    .btn-primary { background:var(--accent); color:#0a0a0a; text-decoration:none; font-family:var(--font-mono); font-weight:700; font-size:.7rem; letter-spacing:2px; text-transform:uppercase; padding:.9rem 2.2rem; clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); transition:transform .2s,box-shadow .2s; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,229,204,.3); }
    .btn-ghost { color:var(--text); text-decoration:none; font-size:.7rem; letter-spacing:2px; text-transform:uppercase; display:flex; align-items:center; gap:.4rem; transition:color .2s; }
    .btn-ghost:hover { color:var(--accent); }
    .btn-ghost::after { content:'↓'; }
    .hero-line { position:absolute; right:3rem; top:50%; transform:translateY(-50%); writing-mode:vertical-rl; font-size:.6rem; letter-spacing:4px; text-transform:uppercase; color:var(--muted); }
    .ticker { padding:2.2rem 3rem; border-top:1px solid var(--border); overflow:hidden; }
    .ticker-track { display:flex; gap:3rem; animation:tick 28s linear infinite; white-space:nowrap; }
    .ticker-track span { font-size:.65rem; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }
    .ticker-track .dot { color:var(--accent); }
    @keyframes tick { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    .sec { padding:6rem 3rem; border-top:1px solid var(--border); }
    .sec-label { font-size:.65rem; letter-spacing:3px; color:var(--accent); margin-bottom:.5rem; }
    .sec-title { font-family:var(--font-display); font-weight:800; font-size:clamp(2.2rem,4.5vw,4.5rem); letter-spacing:-2px; line-height:1; margin-bottom:3.5rem; }
    .sec-header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:3.5rem; }
    .sec-count { font-size:.7rem; color:var(--muted); letter-spacing:2px; }
    .p-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:1.5px; background:var(--border); }
    .p-card { background:var(--surface); padding:2.4rem; position:relative; overflow:hidden; transition:background .3s; }
    .p-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(0,229,204,.04),transparent 60%); opacity:0; transition:opacity .3s; }
    .p-card:hover::before { opacity:1; }
    .p-card:hover { background:#161616; }
    .p-card.wide { grid-column:span 2; }
    .p-num { font-size:.6rem; letter-spacing:3px; color:var(--accent); margin-bottom:1.6rem; }
    .badge { display:inline-block; background:rgba(0,229,204,.1); color:var(--accent); font-size:.57rem; letter-spacing:2px; text-transform:uppercase; padding:.18rem .55rem; margin-left:.5rem; border:1px solid rgba(0,229,204,.2); }
    .p-name { font-family:var(--font-display); font-weight:700; font-size:1.4rem; letter-spacing:-.5px; margin-bottom:.85rem; transition:color .2s; }
    .p-card:hover .p-name { color:var(--accent); }
    .p-desc { color:var(--muted); font-size:.76rem; line-height:2; margin-bottom:1.6rem; }
    .p-desc strong { color:var(--text); }
    .p-desc .hl { color:var(--accent); }
    .p-tags { display:flex; flex-wrap:wrap; gap:.42rem; margin-bottom:1.6rem; }
    .tag { font-size:.59rem; letter-spacing:1.5px; text-transform:uppercase; padding:.27rem .72rem; border:1px solid var(--border); color:var(--muted); transition:border-color .2s,color .2s; }
    .p-card:hover .tag { border-color:rgba(0,229,204,.3); color:var(--text); }
    .p-meta { display:flex; gap:1.5rem; flex-wrap:wrap; margin-bottom:1.6rem; padding:.9rem 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
    .m-item { display:flex; flex-direction:column; gap:.2rem; }
    .m-label { font-size:.57rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
    .m-val { font-size:.7rem; font-weight:700; }
    .m-val.hl { color:var(--accent); }
    .p-links { display:flex; gap:1.5rem; }
    .p-link { font-size:.65rem; letter-spacing:2px; text-transform:uppercase; text-decoration:none; color:var(--muted); transition:color .2s; }
    .p-link:hover { color:var(--accent); }
    .p-link.primary { color:var(--accent); }
    .p-link.primary:hover { color:#fff; }
